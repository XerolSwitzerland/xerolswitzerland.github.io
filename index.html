<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss – Luxury Parfum</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 10000;
}

.top-logo {
    height: 30px;
}

.bag img {
    width: 28px;
}

/* INTRO (LOGO SCREEN) */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 1.5s ease 1.5s forwards;
}

#intro img {
    width: 260px;
    animation: glow 2s infinite alternate;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGO HAUPT (WICHTIG FIX) */
.hero img {
    width: 280px;
    max-width: 80%;
    filter: drop-shadow(0 0 40px rgba(255,255,255,0.4));
}

/* TEXT (optional später) */
.hero-content {
    text-align: center;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* SECTION */
.section {
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ANIMATION */
@keyframes glow {
    from { filter: drop-shadow(0 0 10px white); }
    to { filter: drop-shadow(0 0 35px white); }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <img src="IMG_1751.jpeg" class="top-logo">
  <div class="bag">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png">
  </div>
</div>

<!-- INTRO -->
<div id="intro">
    <img src="IMG_1751.jpeg">
</div>

<!-- HERO (JETZT RICHTIG WIE DEIN WUNSCH) -->
<div class="hero">
    <img src="IMG_1751.jpeg">
</div>

<!-- NEXT SECTION -->
<div class="section" id="next">
    <h2>Luxus neu definiert – Bald verfügbar 💎</h2>
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView();
}
</script>

</body>
</html>
