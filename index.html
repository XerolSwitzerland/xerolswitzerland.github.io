
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 80px;
    background: #e9e9e9;
}

/* LOGO LINKS */
.logo-left {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    height: 35px;
    filter: brightness(0); /* gleiche Farbe */
}

/* TASCHE RECHTS */
.bag-right {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    height: 35px;
    filter: brightness(0); /* gleiche Farbe */
}

/* HERO (INTRO) */
.hero {
    margin-top: 80px;
    height: 100vh;
    background: url("14A25A66-8A51-49FD-A812-AB9F9BE3DAC3.png") center/contain no-repeat;
    background-color: black;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="IMG_1843.jpeg" class="logo-left">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png" class="bag-right">
</div>

<!-- HERO -->
<div class="hero"></div>

</body>
</html>
