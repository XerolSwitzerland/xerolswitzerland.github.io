
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

/* INTRO FULLSCREEN */
#intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* DAS IST DER WICHTIGE FIX */
#intro img{
  width:100%;
  height:100%;
  object-fit:cover; /* FÜLLT SCREEN */
}

/* NACH INTRO */
.main{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.main img{
  width:250px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="IMG_1751.jpeg">
</div>

<!-- CONTENT -->
<div class="main" id="main">
  <img src="IMG_1751.jpeg">
</div>

<script>
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="flex";
},2000);
</script>

</body>
</html>
