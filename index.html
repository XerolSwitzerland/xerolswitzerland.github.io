<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xerol Swiss – Luxury Parfum Schweiz</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: black;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .section {
            padding: 80px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>XEROL SWISS</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Parfums</a>
        <a href="#">Kontakt</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Xerol Swiss</h2>
        <p>Wo Präzision auf Kraft trifft. In der Schweiz gefertigt für diejenigen, die sich vom Gewöhnlichen abheben.</p>
        <a href="#products" class="btn">Jetzt entdecken</a>
    </div>
</section>

<section id="products" class="section">
    <h2>Unsere Düfte</h2>
    <p>Luxuriöse Parfums aus der Schweiz.</p>
</section>

</body>
</html>
