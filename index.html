<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss – Luxury Parfum</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;

    .logo-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-wrapper img {
    width: 240px;
    border-radius: 6px;

    box-shadow:
        0 0 60px rgba(255,255,255,0.2),
        0 0 120px rgba(255,255,255,0.1),
        0 0 200px rgba(255,255,255,0.05);
}
}

/* INTRO (LOGO SCREEN) */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

#intro img {
    width: 200px;
    animation: glow 2s infinite alternate;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.7);
}

.logo {
    height: 40px;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.5s ease forwards;
}

.fade:nth-child(2) { animation-delay: 0.5s; }
.fade:nth-child(3) { animation-delay: 1s; }
.fade:nth-child(4) { animation-delay: 1.5s; }

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* SECTION */
.section {
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* KEYFRAMES */
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes glow {
    from { filter: drop-shadow(0 0 5px white); }
    to { filter: drop-shadow(0 0 20px white); }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="IMG_1751.jpeg">
</div>

<!-- HEADER -->
<header>
    <img src="IMG_1751.jpeg" class="logo">
</header>

<!-- HERO -->
<div class="logo-wrapper">
    <img src="IMG_1751.jpeg">

    <p style="max-width:300px; text-align:center; margin-top:30px;">
        Nicht nur ein Duft, sondern ein Statement von Macht und Eleganz.
    </p>
</div>

<!-- NEXT SECTION -->
<div class="section" id="next">
    <h2>Luxury Parfums Coming Soon 💎</h2>
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView();
}
</script>

</body>
</html>
