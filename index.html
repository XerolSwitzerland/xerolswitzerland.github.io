<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss – Luxury Parfum</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* IMAGE FIX */
img {
    max-width: 100%;
    height: auto;
    display: block;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo {
    width: 180px;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* SECTION */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}
</style>
</head>

<body>

<div class="hero">
    <img src="IMG_1751.jpeg" class="logo">

    <h1>Nicht nur ein Duft, sondern ein Statement von Macht und Eleganz.</h1>

    <button class="btn" onclick="goNext()">Jetzt entdecken</button>
</div>

<div class="section" id="next">
    <h2>Luxus Parfums – Bald verfügbar 💎</h2>
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
