<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Xerol Switzerland</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* INTRO SCREEN */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease;
    }

    .logo-container {
      position: relative;
      text-align: center;
      color: white;
    }

    /* Glow Effekt */
    .glow {
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(white, transparent 70%);
      filter: blur(60px);
      opacity: 0.5;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.6; transform: translateX(-50%) scale(1.1); }
      100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
    }

    /* Stern */
    .star {
      font-size: 60px;
      margin-bottom: 10px;
      animation: shine 2s infinite;
    }

    @keyframes shine {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .title {
      font-size: 50px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 14px;
      letter-spacing: 6px;
      opacity: 0.7;
      margin-top: 5px;
    }

    /* MAIN CONTENT */
    #main {
      display: none;
      color: white;
      text-align: center;
      padding-top: 100px;
    }
  </style>
</head>

<body>

  <!-- INTRO -->
  <div id="intro">
    <div class="logo-container">
      <div class="glow"></div>
      <div class="star">✦</div>
      <div class="title">xerol</div>
      <div class="subtitle">SWITZERLAND</div>
    </div>
  </div>

  <!-- MAIN PAGE -->
  <div id="main">
    <h1>Willkommen auf deiner Seite 🔥</h1>
  </div>

  <script>
    // Intro verschwindet nach 2.5 Sekunden
    setTimeout(() => {
      const intro = document.getElementById("intro");
      intro.style.opacity = "0";

      setTimeout(() => {
        intro.style.display = "none";
        document.getElementById("main").style.display = "block";
        document.body.style.overflow = "auto";
      }, 1000);
    }, 2500);
  </script>

</body>
</html>
