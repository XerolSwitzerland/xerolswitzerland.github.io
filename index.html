<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
  scroll-behavior: smooth;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.6s ease;
}

.intro-logo {
  width: 180px;
  animation: fadeIn 1.5s ease;
  box-shadow: 0 0 80px rgba(255,255,255,0.25);
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1585386959984-a4155224a1ad?q=80&w=1200') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin-bottom: 20px;
}

.subtext {
  color: #ccc;
  margin-bottom: 40px;
}

.btn {
  padding: 15px 30px;
  border: 1px solid #C5A46D;
  text-decoration: none;
  color: white;
  letter-spacing: 2px;
  transition: 0.3s;
}

.btn:hover {
  background: #C5A46D;
  color: black;
}

/* NEXT SECTION */
.next {
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
  <img src="IMG_1751.jpeg" class="intro-logo">
</div>

<!-- 🔥 HERO -->
<section class="hero">

  <img src="IMG_1817.jpeg" class="hero-img">

  <div class="hero-content">
    <div class="headline">Pure Eleganz.</div>
    <div class="subtext">Ein Duft. Ein Statement.</div>
    <a href="#next" class="btn">JETZT ENTDECKEN</a>
  </div>

</section>
</section>

<!-- 🔥 NEXT SECTION -->
<section id="next" class="next">
  Willkommen bei Xerol Switzerland ✨
</section>

<!-- 🔥 SCRIPT -->
<script>
setTimeout(() => {
  const intro = document.getElementById("intro");
  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
  }, 600);
}, 2500);
</script>

</body>
</html>
