<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Switzerland</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO ANIMATION */
.logo {
    width: 220px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.5s ease forwards;
}

/* TEXT */
h1 {
    margin-top: 20px;
    font-size: 40px;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards;
    animation-delay: 0.5s;
}

p {
    font-size: 18px;
    max-width: 320px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards;
    animation-delay: 1s;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    animation: fadeUp 1.5s ease forwards;
    animation-delay: 1.5s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ANIMATION KEYFRAME */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* SECOND SECTION */
.section {
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
}

/* SMOOTH SCROLL */
html {
    scroll-behavior: smooth;
}
</style>
</head>

<body>

<div class="hero">

    <!-- LOGO -->
    <img src="IMG_1751.jpeg" class="logo">

    <h1>Xerol Swiss</h1>

    <p>
        Wo Präzision auf Kraft trifft. In der Schweiz gefertigt für diejenigen,
        die sich vom Gewöhnlichen abheben.
    </p>

    <button class="btn" onclick="goNext()">Jetzt entdecken</button>

</div>

<div class="section" id="next">
    Coming Soon 🔥
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView();
}
</script>

</body>
</html>
