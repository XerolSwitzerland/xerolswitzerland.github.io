
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
}

/* TOPBAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: #f2f2f2;
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 10000;
}

/* LOGO LINKS */
.top-logo {
    height: 35px;
    transform: rotate(-2deg);
}

/* TASCHE RECHTS → MEHR NACH LINKS */
.bag {
    position: absolute;
    right: 40px; /* vorher 15px → jetzt weiter links */
}

.bag img {
    width: 30px;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

#intro img {
    width: 220px;
    filter: drop-shadow(0 0 25px white);
}

/* HERO */
.hero {
    height: 100vh;
    background: url('CC91528A-789B-4124-9790-82C0DB69E60B.png') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
    text-align: center;
}

.hero h1 {
    font-size: 40px;
    color: white;
}

.hero p {
    color: white;
}

.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid gold;
    color: white;
    background: transparent;
}

/* ANIMATION */
@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<div class="topbar">
    <img src="IMG_1843.jpeg" class="top-logo">
    <div class="bag">
        <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png">
    </div>
</div>

<div id="intro">
    <img src="IMG_1751.jpeg">
</div>

<div class="hero">
    <h1>Pure Eleganz.</h1>
    <p>Ein Duft. Ein Statement.</p>
    <button class="btn">JETZT ENTDECKEN</button>
</div>

</body>
</html>
