<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo {
    width: 220px;
    margin-bottom: 20px;
}

/* TEXT */
h1 {
    font-size: 28px;
    margin: 10px 0;
    text-align: center;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
}

/* SECTION */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}
</style>
</head>

<body>

<div class="hero">
    <img src="IMG_1751.jpeg" class="logo">

    <h1>Nicht nur ein Duft, sondern ein Statement von Macht und Eleganz.</h1>

    <button class="btn" onclick="goNext()">Jetzt entdecken</button>
</div>

<div class="section" id="next">
    <h2>Luxury Parfums Coming Soon 💎</h2>
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
