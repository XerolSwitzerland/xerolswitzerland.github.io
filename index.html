<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Switzerland</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* INTRO FIX */
#intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: black;
  z-index: 9999;
}

#intro img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* WICHTIG → kein Rand mehr */
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  z-index: 1000;
}

.navbar img {
  height: 30px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('CC91528A-789B-4124-9790-82C0DB69E60B.png') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding-top: 70px;
}

.hero-content h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero-content p {
  margin-bottom: 20px;
}

.btn {
  padding: 12px 30px;
  border: 1px solid gold;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- INTRO (JETZT VOLLBILD) -->
<div id="intro">
  <img src="IMG_1751.jpeg" alt="Intro">
</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="IMG_1751.jpeg" alt="Logo">
  <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png" alt="Bag">
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Pure Eleganz.</h1>
    <p>Ein Duft. Ein Statement.</p>
    <a href="#" class="btn">JETZT ENTDECKEN</a>
  </div>
</div>

<script>
// Intro verschwindet smooth
setTimeout(() => {
  document.getElementById("intro").style.opacity = "0";
  document.getElementById("intro").style.transition = "1s";
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
  }, 1000);
}, 2500);
</script>

</body>
</html>
