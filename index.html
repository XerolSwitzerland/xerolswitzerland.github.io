<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
body {
    margin: 0;
    background: black;
}

/* INTRO */
#intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    background: black;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;

    animation: fadeOut 1.5s ease 2s forwards;
}

/* DAS IST DER KEY */
#intro img {
    width: 90%;
    max-width: 400px;
    height: auto;
    display: block;
}

/* FADE */
@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="14A25A66-8A51-49FD-A812-AB9F9BE3DAC3.png">
</div>

</body>
</html>
