<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  overflow-x: hidden;
}

/* BODY */
body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* 🔥 INTRO (PERFEKT BALANCE) */
#intro {
  position: fixed;
  inset: 0;
  z-index: 9999;

  background: url("IMG_1751.jpeg") center center no-repeat;
  background-size: 70%; /* 🔥 NICHT ZU ZOOMED */
  background-color: black;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("IMG_1817.jpeg") center center no-repeat;
  background-size: cover;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 20px;
}

.subtext {
  color: #ccc;
  margin-bottom: 30px;
}

.btn {
  padding: 15px 30px;
  border: 1px solid #C5A46D;
  text-decoration: none;
  color: white;
  letter-spacing: 2px;
  transition: 0.3s;
}

.btn:hover {
  background: #C5A46D;
  color: black;
}

/* NEXT */
.next {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ANIMATION */
.fade-out {
  opacity: 0;
  transition: opacity 0.8s ease;
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro"></div>

<!-- 🔥 HERO -->
<section class="hero">
  <div class="hero-content">
    <div class="headline">Pure Eleganz
