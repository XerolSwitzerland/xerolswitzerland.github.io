<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xerol Switzerland</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 200px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 40px;
            margin: 10px 0;
        }

        p {
            font-size: 18px;
            max-width: 300px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

    <div class="hero">
        <!-- DEIN LOGO -->
        <img src="IMG_1751.jpeg" alt="Xerol Logo">

        <h1>Xerol Swiss</h1>

        <p>
            Wo Präzision auf Kraft trifft. In der Schweiz gefertigt für diejenigen,
            die sich vom Gewöhnlichen abheben.
        </p>

        <button class="btn" onclick="scrollDown()">Jetzt entdecken</button>
    </div>

    <div id="next" style="height:100vh; background:#111; display:flex; align-items:center; justify-content:center;">
        <h2>Mehr Content kommt hier 👀</h2>
    </div>

    <script>
        function scrollDown() {
            document.getElementById("next").scrollIntoView({ behavior: "smooth" });
        }
    </script>

</body>
</html>
