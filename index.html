
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

#intro img {
    width: 70%;
    max-width: 300px;
    object-fit: contain;
    animation: glow 2s infinite alternate;
}

/* TOPBAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 1000;
}

.topbar img {
    height: 30px;
}

/* HERO BACKGROUND */
.hero {
    height: 100vh;
    background: url("CC91528A-789B-4124-9790-82C0DB69E60B.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
    text-align: center;
}

/* TEXT */
.hero h1 {
    font-size: 40px;
    font-weight: 300;
}

.hero p {
    margin-top: 10px;
    font-size: 16px;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 30px;
    border: 1px solid gold;
    background: transparent;
    color: white;
    letter-spacing: 2px;
}

/* ANIMATION */
@keyframes glow {
    from { filter: drop-shadow(0 0 5px white); }
    to { filter: drop-shadow(0 0 20px white); }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="IMG_1751.jpeg">
</div>

<!-- TOPBAR -->
<div class="topbar">
    <img src="IMG_1751.jpeg">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png">
</div>

<!-- HERO -->
<div class="hero">
    <h1>Pure Eleganz.</h1>
    <p>Ein Duft. Ein Statement.</p>
    <button class="btn">JETZT ENTDECKEN</button>
</div>

</body>
</html>
