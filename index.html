
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss – Luxury Parfum</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* TOPBAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 10000;
}

.top-logo {
    height: 30px;
}

.bag img {
    width: 28px;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

#intro img {
    width: 80%;
    max-width: 300px;
    height: auto;
    object-fit: contain;
    animation: glow 2s infinite alternate;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 80px;
    text-align: center;
}

.hero img {
    width: 200px;
}

/* TEXT ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.5s ease forwards;
}

.fade:nth-child(2) { animation-delay: 0.5s; }
.fade:nth-child(3) { animation-delay: 1s; }
.fade:nth-child(4) { animation-delay: 1.5s; }

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* SECTION */
.section {
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ANIMATION */
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes glow {
    from { filter: drop-shadow(0 0 5px white); }
    to { filter: drop-shadow(0 0 20px white); }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <img src="IMG_1751.jpeg" class="top-logo">
  <div class="bag">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png">
  </div>
</div>

<!-- INTRO -->
<div id="intro">
    <img src="IMG_1751.jpeg">
</div>

<!-- HERO -->
<div class="hero">
    <img src="IMG_1751.jpeg" class="fade">
    <h1 class="fade">Nicht nur ein Duft, sondern ein Statement von Macht und Eleganz.</h1>
    <p class="fade">Wo Präzision auf Kraft trifft. Schweizer Luxus neu definiert.</p>
    <button class="btn fade" onclick="goNext()">Jetzt entdecken</button>
</div>

<!-- NEXT -->
<div class="section" id="next">
    <h2>Luxus neu definiert – Bald verfügbar 💎</h2>
</div>

<script>
function goNext() {
    document.getElementById("next").scrollIntoView();
}
</script>

</body>
</html>
