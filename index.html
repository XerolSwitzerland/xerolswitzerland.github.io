
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  background: #e9e9e9;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
}

.header-left,
.header-right {
  display: flex;
  align-items: center;
}

/* ICONS GLEICH */
.header-left img,
.header-right img {
  height: 30px;
  width: 30px;
  object-fit: contain;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

/* LOGO FIX */
.hero-logo img {
  width: 300px;
  height: auto;
  display: block;
  margin: 0 auto;
  object-fit: contain;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="IMG_1843.jpeg" alt="logo">
  </div>

  <div class="header-right">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png" alt="bag">
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-logo">
    <img src="IMG_1751.jpeg" alt="xerol logo">
  </div>
</section>

</body>
</html>
