<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    z-index: 10000;
}

.logo-left {
    height: 30px;
}

.bag {
    height: 30px;
    transform: translateX(-25px);
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeOut 2s ease 2s forwards;
}

#intro img {
    width: 260px;
    animation: glow 2s infinite alternate;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("CC91528A-789B-4124-9790-82C0DB69E60B.png") center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
    text-align: center;
}

.hero h1 {
    font-size: 40px;
    margin: 0;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease forwards;
}

.hero p {
    margin: 10px 0 20px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease 0.3s forwards;
}

.btn {
    padding: 12px 30px;
    border: 1px solid gold;
    background: transparent;
    color: white;
    cursor: pointer;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease 0.6s forwards;
}

/* NEXT SECTION */
.next-section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SCROLL ANIMATION */
.scroll-item {
    opacity: 0;
    transform: translateY(50px);
    transition: 0.8s;
}

.scroll-item.show {
    opacity: 1;
    transform: translateY(0);
}

/* ANIMATION */
@keyframes glow {
    from { filter: drop-shadow(0 0 5px white); }
    to { filter: drop-shadow(0 0 20px white); }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <img src="IMG_1843.jpeg" class="logo-left">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png" class="bag">
</div>

<!-- INTRO -->
<div id="intro">
    <img src="14A25A66-8A51-49FD-A812-AB9F9BE3DAC3.png">
</div>

<!-- HERO -->
<div class="hero">
    <h1>Pure Eleganz.</h1>
    <p>Ein Duft. Ein Statement.</p>
    <a href="#next" class="btn">JETZT ENTDECKEN</a>
</div>

<!-- NEXT SECTION -->
<div id="next" class="next-section">
    <h2 class="scroll-item">Unsere Produkte</h2>
</div>

<script>
// SCROLL ANIMATION
const items = document.querySelectorAll('.scroll-item');

window.addEventListener('scroll', () => {
    items.forEach(item => {
        const itemTop = item.getBoundingClientRect().top;
        const trigger = window.innerHeight - 100;

        if(itemTop < trigger){
            item.classList.add('show');
        }
    });
});
</script>

</body>
</html>
