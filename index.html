<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Swiss</title>

<style>
body {
    margin: 0;
    background: black;
}

/* INTRO FIX */
#intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100dvh;

    background: black url("14A25A66-8A51-49FD-A812-AB9F9BE3DAC3.png") no-repeat center;
    background-size: contain; /* WICHTIG */

    z-index: 9999;
    transition: opacity 1s ease;
}

.hide {
    opacity: 0;
    pointer-events: none;
}

/* REST DER SEITE */
.hero {
    height: 100vh;
    background: url("CC91528A-789B-4124-9790-82C0DB69E60B.png") center/cover no-repeat;
}
</style>
</head>

<body>

<div id="intro"></div>

<div class="hero"></div>

<script>
window.onload = function () {
    setTimeout(() => {
        document.getElementById("intro").classList.add("hide");
    }, 2000);
};
</script>

</body>
</html>
