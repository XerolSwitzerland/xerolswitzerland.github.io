<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* LOGO */
.intro-logo {
  width: 70%;
  max-width: 300px;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("IMG_1817.jpeg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="IMG_1751.jpeg" class="intro-logo">
</div>

<!-- HERO -->
<section class="hero">
  <h1>Willkommen bei Xerol</h1>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {
  setTimeout(function() {
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";
    
    setTimeout(function() {
      intro.remove();
    }, 500);
    
  }, 2000);
});
</script>

</body>
</html>
