
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Switzerland</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 80px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-sizing: border-box;
}

/* LINKES LOGO */
.logo-left {
    height: 40px;
    width: auto;
    object-fit: contain;
    transform: translateY(0); /* gerade */
    filter: brightness(0); /* schwarz machen */
}

/* RECHTE TASCHE */
.bag-right {
    height: 40px;
    width: auto;
    object-fit: contain;
    transform: translateY(0); /* gleiche Höhe */
    filter: brightness(0); /* gleiche Farbe wie links */
}

/* HERO */
.hero {
    margin-top: 80px;
    height: 100vh;
    background: url('DEIN-PARFUM-BILD.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* GROSSES LOGO */
.main-logo {
    width: 300px;
    max-width: 80%;
    object-fit: contain;
    display: block;
    margin: 0 auto;
    transform: translateY(0); /* gerade */
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="IMG_1843.jpeg" class="logo-left">
    <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png" class="bag-right">
</div>

<!-- HERO -->
<div class="hero">
    <img src="14A25A66-8A51-49FD-A812-AB9F9BE3DAC3.png" class="main-logo">
</div>

</body>
</html>
