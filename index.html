<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerol Switzerland</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* INTRO */
#intro{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* DAS IST DER FIX → genau wie dein Bild */
#intro img{
  width:70%;          /* kleiner wie dein Screenshot */
  max-width:320px;    /* begrenzt */
  height:auto;
  display:block;
}

/* HERO */
.hero{
  height:100vh;
  background:url('CC91528A-789B-4124-9790-82C0DB69E60B.png') no-repeat center center/cover;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
}

.navbar img{
  height:30px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <img src="IMG_1751.jpeg">
</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="IMG_1751.jpeg">
  <img src="42543725-B185-48B2-A22E-0B5BA6D9F2A3.png">
</div>

<!-- HERO -->
<div class="hero"></div>

<script>
setTimeout(()=>{
  document.getElementById("intro").style.opacity="0";
  document.getElementById("intro").style.transition="1s";
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
  },1000);
},2500);
</script>

</body>
</html>
