<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* 🔥 INTRO LOGO */
.intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-box {
  padding: 60px;
  box-shadow: 0 0 60px rgba(255,255,255,0.3);
  animation: glow 2s ease-in-out infinite alternate;
}

.logo-box img {
  width: 200px;
}

@keyframes glow {
  from {
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
  }
  to {
    box-shadow: 0 0 80px rgba(255,255,255,0.6);
  }
}

/* 🔥 HERO (Gisada Style) */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 700px;
  padding: 20px;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin-bottom: 20px;
}

.subtext {
  color: #ccc;
  margin-bottom: 40px;
}

/* BUTTON */
.btn {
  border: 1px solid #C5A46D;
  color: #C5A46D;
  padding: 12px 28px;
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: 0.3s;
}

.btn:hover {
  background: #C5A46D;
  color: black;
}

/* SECTION */
.section {
  padding: 120px 20px;
  text-align: center;
  max-width: 900px;
  margin: auto;
}

  font-family: 'Playfair Display', serif;
  font-size: 36px;
