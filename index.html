<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* 🔥 INTRO SCREEN */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1s ease;
}

.logo-box {
  padding: 60px;
  box-shadow: 0 0 60px rgba(255,255,255,0.3);
  animation: glow 2s infinite alternate;
}

.logo-box img {
  width: 200px;
}

@keyframes glow {
  from { box-shadow: 0 0 20px rgba(255,255,255,0.2); }
  to { box-shadow: 0 0 80px rgba(255,255,255,0.6); }
}

/* 🔥 HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin-bottom: 20px;
}

.subtext {
  color: #ccc;
  margin-bottom: 40px;
}

/* BUTTON */
.btn {
  border: 1px solid #C5A46D;
  color: #C5A46D;
  padding: 12px 28px;
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: 0.3s;
}

.btn:hover {
  background: #C5A46D;
  color: black;
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
  <div class="logo-box">
    <img src="https://i.imgur.com/yourlogo.png" alt="logo">
  </div>
</div>

<!-- 🔥 WEBSITE -->
<section class="hero">
  <div class="hero-content">
    <div class="headline">Pure Eleganz.</div>
    <div class="subtext">Ein Duft. Ein Statement.</div>
    <a href="#" class="btn">Jetzt entdecken</a>
  </div>
</section>

<script>
  // 🔥 Intro verschwindet nach 2.5 Sekunden
  setTimeout(() => {
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";

    setTimeout(() => {
      intro.style.display = "none";
    }, 1000);

  }, 2500);
</script>

</body>
</html>
