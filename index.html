<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xerol Switzerland</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  overflow-x: hidden;
}

/* BODY */
body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 9999;
  overflow: hidden;
}

/* 💥 FIXED LOGO (ZOOM) */
.intro-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(2.2);
  height: 100%;
  width: auto;
}

/* HERO */
.hero {
  height: 100vh;
  background-image: url("IMG_1817.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 20px;
}

.subtext {
  color: #ccc;
  margin-bottom: 30px;
}

.btn {
  padding: 15px 30px;
  border: 1px solid #C5A46D;
  text-decoration: none;
  color: white;
  letter-spacing: 2px;
  transition: 0.3s;
}

.btn:hover {
  background: #C5A46D;
  color: black;
}

/* NEXT */
.next {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ANIMATION */
.fade-out {
  opacity: 0;
  transition: opacity 0.8s ease;
}

</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
  <img src="IMG_1751.jpeg" class="intro-logo">
</div>

<!-- 🔥 HERO -->
<section class="hero">
  <div class="hero-content">
    <div class="headline">Pure Eleganz.</div>
    <div class="subtext">Ein Duft. Ein Statement.</div>
    <a href="#next" class="btn">JETZT ENTDECKEN</a>
  </div>
</section>

<!-- 🔥 NEXT -->
<section id="next" class="next">
  Willkommen bei Xerol Switzerland ✨
</section>

<script>
setTimeout(() => {
  const intro = document.getElementById("intro");
  intro.classList.add("fade-out");

  setTimeout(() => {
    intro.style.display = "none";
  }, 800);
}, 2500);
</script>

</body>
</html>
